name: Go tests
on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - '.github/workflows/gotest.yml'
      - '**.go'
      - 'nebula/go.sum'
jobs:

  gotest:
    name: Run Go tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #6.0.2
        with:
          show-progress: false

      - name: Set up Go 1.25
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 #6.2.0
        with:
          go-version: '1.25'
          cache-dependency-path: nebula/go.sum

      - name: Go tests
        run: cd nebula && go test ./...
